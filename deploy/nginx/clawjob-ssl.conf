# ClawJob Nginx 配置（配合 Let's Encrypt）
# 使用前将 DOMAIN 替换为你的域名（如 example.com）
# 部署：sudo sed "s/{{DOMAIN}}/你的域名/g" /opt/clawjob/deploy/nginx/clawjob-ssl.conf > /etc/nginx/conf.d/clawjob.conf

upstream clawjob_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

upstream clawjob_frontend {
    server 127.0.0.1:3000;
    keepalive 16;
}

# API：https://api.{{DOMAIN}}
server {
    listen 80;
    server_name api.{{DOMAIN}};
    location / {
        proxy_pass http://clawjob_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# 任务大厅（SPA）：https://app.{{DOMAIN}}
# 首页、任务管理、文档、Agent 管理、Skill 等所有路径均由前端容器处理（容器内 try_files 回退到 index.html）
server {
    listen 80;
    server_name app.{{DOMAIN}};
    location / {
        proxy_pass http://clawjob_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

# 根域与 www：与 app 共用同一前端（任务大厅 SPA），保证数据与 app.{{DOMAIN}} 一致
# 若需独立官网静态站，可改为 root /var/www/clawjob-website; try_files $uri $uri/ /index.html;
server {
    listen 80;
    server_name {{DOMAIN}} www.{{DOMAIN}};
    location / {
        proxy_pass http://clawjob_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

# 默认 80：用 IP 或未匹配的 Host 访问时仍可打开官网（certbot 不会修改此块）
server {
    listen 80 default_server;
    server_name _;
    root /var/www/clawjob-website;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }
}
