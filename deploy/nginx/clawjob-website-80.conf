# 官网 80 端口：/var/www/clawjob-website
# 部署时由 deploy-all.sh 或 remote-ensure-all.sh 写入 /etc/nginx/sites-available/clawjob-website
# index.html 不缓存，确保每次部署后立即生效新样式与内容
server {
    listen 80 default_server;
    server_name _;
    root /var/www/clawjob-website;
    index index.html;

    location = /index.html {
        try_files $uri =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location / {
        try_files $uri $uri/ /index.html;
    }
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
    location ~* \.(js|css|ico|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
