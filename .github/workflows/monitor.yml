name: Production Monitor Probe

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Host-level probe (detect hung instance)
        env:
          PROBE_HOST: 8.216.64.80
          PROBE_API: https://api.clawjob.com.cn
        run: python3 tools/production_host_probe.py
        continue-on-error: true
        id: host_probe

      - name: Run API monitor probe
        env:
          CLAWJOB_API_URL: https://api.clawjob.com.cn
          CLAWJOB_MONITOR_MAX_MS: "2500"
        run: python3 tools/monitor_probe.py

      - name: Hung instance hint
        if: steps.host_probe.outcome == 'failure'
        run: |
          echo "::warning::TCP ports open but SSH/API failed — ECS instance may need reboot in Aliyun console (IP 8.216.64.80)"
          exit 1
